version: '3.8'

services:
  db:
    image: mariadb:10.11
    restart: always
    command: --slow_query_log=1 --long_query_time=2 --slow_query_log_file=/var/lib/mysql/slow.log --innodb_buffer_pool_size=256M
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:6-php8.2-fpm
    depends_on:
      - db
      - redis
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: password
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_REDIS_HOST: redis
      WORDPRESS_REDIS_PORT: 6379
    volumes:
      - wp_data:/var/www/html
    # Dynamické ladenie PHP-FPM cez environmentálne premenné
    command: >
      sh -c "sed -i 's/pm.max_children = 5/pm.max_children = ${PHP_MAX_CHILDREN:-25}/g' /usr/local/etc/php-fpm.d/www.conf &&
             sed -i 's/pm.start_servers = 2/pm.start_servers = ${PHP_START_SERVERS:-5}/g' /usr/local/etc/php-fpm.d/www.conf &&
             sed -i 's/pm.min_spare_servers = 1/pm.min_spare_servers = ${PHP_MIN_SPARE:-2}/g' /usr/local/etc/php-fpm.d/www.conf &&
             sed -i 's/pm.max_spare_servers = 3/pm.max_spare_servers = ${PHP_MAX_SPARE:-10}/g' /usr/local/etc/php-fpm.d/www.conf &&
             docker-entrypoint.sh php-fpm"

  nginx:
    image: nginx:1.24
    depends_on:
      - wordpress
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - wp_data:/var/www/html

  redis:
    image: redis:7-alpine
    restart: always

  varnish:
    image: varnish:7.4
    depends_on:
      - nginx
    ports:
      - "8080:80"
    volumes:
      - ./default.vcl:/etc/varnish/default.vcl:ro
      - varnish_data:/var/lib/varnish
    environment:
      - VARNISH_SIZE=${VARNISH_SIZE:-512M}

  varnish-exporter:
    image: jonnenauha/prometheus_varnish_exporter:latest
    depends_on:
      - varnish
    volumes:
      - varnish_data:/var/lib/varnish:ro
    restart: always

  redis-exporter:
    image: oliver006/redis_exporter:latest
    depends_on:
      - redis
    environment:
      - REDIS_ADDR=redis://redis:6379
    restart: always

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - varnish-exporter
      - redis-exporter
    restart: always

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always

volumes:
  db_data:
  wp_data:
  varnish_data:
  prometheus_data:
  grafana_data:
