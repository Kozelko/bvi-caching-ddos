# Konfigurácia zóny pre Rate Limiting (Ochrana pred DDoS)
limit_req_zone $binary_remote_addr zone=ddos_ochrana:10m rate=15r/s;

server {
    listen 80;
    server_name localhost;

    root /var/www/html;
    index index.php;

    # Trust X-Forwarded-For headers from Docker network (e.g. Varnish)
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;

    location / {
        # Aplikácia rate limitingu: max 15 požiadaviek za sekundu z jednej IP, 
        # nárazník (burst) 30 požiadaviek.
        limit_req zone=ddos_ochrana burst=30 nodelay;
        
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        limit_req zone=ddos_ochrana burst=30 nodelay;
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
